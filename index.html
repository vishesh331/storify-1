<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist | Premium Goods</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FAFAFA; --card: #FFFFFF; --text: #111111; --muted: #666666; --border: #E5E5E5; --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.04); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        input { font-family: inherit; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        nav { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); background: rgba(250,250,250,0.8); border-bottom: 1px solid var(--border); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; height: 60px; gap: 24px; }
        .nav-logo { font-weight: 600; font-size: 18px; letter-spacing: -0.5px; flex-shrink: 0; }
        .nav-links { display: flex; gap: 24px; align-items: center; font-size: 14px; color: var(--muted); flex-shrink: 0; }
        
        .nav-search-container { flex-grow: 1; display: flex; justify-content: center; }
        .nav-search-btn { font-size: 16px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
        .nav-search-btn:hover { color: var(--text); }
        .nav-search-input { width: 100%; max-width: 400px; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 14px; outline: none; transition: border 0.2s; }
        .nav-search-input:focus { border-color: var(--text); }
        
        .auth-buttons { display: flex; align-items: center; gap: 16px; } 
        
        .hero { text-align: center; padding: 120px 0 80px; }
        .hero h1 { font-size: 48px; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 16px; }
        .hero p { color: var(--muted); margin-bottom: 32px; }
        .hero-search-bar { width: 100%; max-width: 500px; margin: 0 auto; padding: 16px 24px; border-radius: 100px; border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow); font-size: 16px; outline: none; transition: border 0.2s; }
        .hero-search-bar:focus { border-color: var(--text); }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; padding-bottom: 120px; }
        .product-card { background: transparent; transition: transform 0.3s ease; animation: fadeUp 0.5s ease forwards; opacity: 0; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img-box { background: var(--card); border-radius: var(--radius); aspect-ratio: 1; overflow: hidden; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .product-img-box img { transform: scale(1.05); }
        .product-info { display: flex; justify-content: space-between; align-items: flex-start; }
        .product-name { font-weight: 500; font-size: 15px; }
        .product-cat { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .product-price { font-weight: 500; font-size: 15px; }
        .add-cart-btn { margin-top: 16px; width: 100%; padding: 10px; background: var(--text); color: white; border-radius: 100px; font-size: 13px; transition: opacity 0.3s, background 0.3s; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s ease; }
        .modal-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: center; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .modal-btn { width: 100%; padding: 12px; background: #111; color: white; border-radius: 8px; font-weight: 500; }
        .hidden { display: none !important; }
        
        .success-icon { width: 60px; height: 60px; background: #E8F5E9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; color: #4CAF50; }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <div class="nav-logo">Minimalist</div>
            
            <div class="nav-search-container">
                <button id="search-toggle" class="nav-search-btn" onclick="toggleNavSearch()">
                    🔍 <span>Search</span>
                </button>
                <input type="text" id="nav-search-input" class="nav-search-input hidden" placeholder="Search products..." oninput="filterProducts(this.value)">
            </div>
            
            <div class="nav-links">
                <button onclick="checkout()">Checkout (<span id="cart-count">0</span>)</button>
                
                <div id="auth-section" class="auth-buttons">
                    <button onclick="showAuthModal('login')">Login</button>
                    <button onclick="showAuthModal('signup')">Sign Up</button>
                </div>
                
                <div id="user-section" class="hidden" style="display: flex; align-items: center; gap: 16px;">
                    <span id="user-email" style="color:#111; font-weight: 500; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                    <button onclick="logout()" style="color: #666;">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>What are you looking for today?</h1>
            <p>Find curated, premium goods designed with intention.</p>
            <input type="text" class="hero-search-bar" placeholder="Search products..." oninput="filterProducts(this.value)">
        </div>
        <div class="product-grid" id="product-grid">
            <div style="text-align: center; padding: 40px; color: #666; grid-column: 1/-1;">Loading products...</div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <!-- Default Auth Form -->
            <div id="auth-form-container">
                <form onsubmit="event.preventDefault(); handleAuth();">
                    <h3 id="modal-title" style="margin-bottom: 20px; font-size: 20px;">Login</h3>
                    <input type="email" id="auth-email" class="modal-input" placeholder="Email" required>
                    <input type="password" id="auth-pass" class="modal-input" placeholder="Password" required>
                    <button type="submit" id="submit-auth-btn" class="modal-btn">Submit</button>
                </form>
                <button onclick="hideAuthModal()" style="width: 100%; padding: 12px; margin-top: 10px; color: #666;">Cancel</button>
            </div>
            
            <!-- Success Message (Hidden by default) -->
            <div id="auth-success-container" class="hidden">
                <div class="success-icon">✓</div>
                <h3 style="margin-bottom: 12px; font-size: 20px;">Verify your email</h3>
                <p style="color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5;">
                    We've sent a confirmation link to your email. Please click the link to verify your account, then return here to log in.
                </p>
                <button class="modal-btn" onclick="switchToLoginFromSuccess()">Continue to Login</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://orbaakzywwwiiemyszmd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1T6au-U7x62mijV5eP6IGg_6SWEaifK';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cart = [];
        let allProducts = []; 
        let authMode = 'login';

        // --- Search Logic ---
        function toggleNavSearch() {
            const btn = document.getElementById('search-toggle');
            const input = document.getElementById('nav-search-input');
            btn.classList.toggle('hidden');
            input.classList.toggle('hidden');
            if (!input.classList.contains('hidden')) {
                input.focus();
            }
        }

        function filterProducts(query) {
            query = query.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query) || (p.categories?.name || '').toLowerCase().includes(query));
            renderProducts(filtered);
        }

        // --- Auth Logic ---
        function showAuthModal(mode) {
            authMode = mode;
            // Reset to form view
            document.getElementById('auth-form-container').classList.remove('hidden');
            document.getElementById('auth-success-container').classList.add('hidden');
            
            document.getElementById('modal-title').innerText = mode === 'login' ? 'Login' : 'Sign Up';
            document.getElementById('submit-auth-btn').innerText = mode === 'login' ? 'Log In' : 'Sign Up';
            document.getElementById('auth-modal').classList.remove('hidden');
        }

        function hideAuthModal() { 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-pass').value = '';
        }

        function switchToLoginFromSuccess() {
            document.getElementById('auth-form-container').classList.remove('hidden');
            document.getElementById('auth-success-container').classList.add('hidden');
            document.getElementById('modal-title').innerText = 'Login';
            document.getElementById('submit-auth-btn').innerText = 'Log In';
            authMode = 'login';
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-pass').value = '';
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            
            try {
                if (authMode === 'login') {
                    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                    if (error) throw error;
                    
                    if (data.user) {
                        hideAuthModal(); // Close popup on success
                        updateUI(data.user);
                    }
                } else {
                    const { data, error } = await sb.auth.signUp({ email, password: pass });
                    if (error) throw error;
                    
                    if (data.user) {
                        // Show success message instead of closing modal
                        document.getElementById('auth-form-container').classList.add('hidden');
                        document.getElementById('auth-success-container').classList.remove('hidden');
                    }
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        async function logout() {
            await sb.auth.signOut();
            updateUI(null);
        }

        function updateUI(user) {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('user-section').style.display = 'flex';
                document.getElementById('user-email').innerText = user.email;
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('auth-section').style.display = 'flex';
                document.getElementById('user-section').classList.add('hidden');
                document.getElementById('user-section').style.display = 'none';
            }
        }

        // --- Storefront Logic ---
        async function loadProducts() {
            const { data, error } = await sb.from('products').select('*, categories(name)').eq('is_active', true);
            if (error || data.length === 0) {
                document.getElementById('product-grid').innerHTML = `<div style="text-align: center; padding: 40px; color: #666; grid-column: 1/-1;">No products found. Add some in the Admin panel!</div>`;
                return;
            }
            allProducts = data;
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            if (products.length === 0) {
                grid.innerHTML = `<div style="text-align: center; padding: 40px; color: #666; grid-column: 1/-1;">No products match your search.</div>`;
                return;
            }
            grid.innerHTML = products.map((p, index) => `
                <div class="product-card" style="animation-delay: ${index * 0.05}s;">
                    <div class="product-img-box">
                        <img src="${p.image_url || 'https://via.placeholder.com/300'}" alt="${p.name}">
                    </div>
                    <div class="product-info">
                        <div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-cat">${p.categories?.name || 'Uncategorized'}</div>
                        </div>
                        <div class="product-price">$${p.price}</div>
                    </div>
                    <button class="add-cart-btn" onclick="addToCart('${p.id}', \`${p.name.replace(/`/g, '')}\`, ${p.price}, this)">Add to Cart</button>
                </div>
            `).join('');
        }

        async function addToCart(id, name, price, btn) {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                alert("Please log in or sign up to add items to your cart.");
                showAuthModal('login');
                return;
            }

            cart.push({ id, name, price });
            document.getElementById('cart-count').innerText = cart.length;
            
            const originalText = btn.innerText;
            btn.innerText = "Added!";
            btn.style.background = "#4CAF50";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 1000);
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty.");
                return;
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            window.location.href = 'cart.html';
        }

        // --- Init ---
        sb.auth.getSession().then(({ data }) => {
            if (data.session) updateUI(data.session.user);
            else updateUI(null);
            loadProducts();
        });

        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                updateUI(session.user);
            } else if (event === 'SIGNED_OUT') {
                updateUI(null);
            }
        });
    </script>
</body>
</html>
